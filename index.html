<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream</title>
    <style>
        body {
            margin: 0;
            background-color: #0d1b2a;
            font-family: Arial, sans-serif;
        }
        /* Das Overlay nutzt jetzt die korrekte Hintergrundfarbe und Flex-Ausrichtung */
        #livestream-overlay {
            display: flex;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 100%;
            background-color: #0d1b2a;
            z-index: 3000;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .stream-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 25px;
            gap: 20px;
        }
        .stream-title {
            color: #fff;
            margin: 0;
            text-align: left;
        }
        .stream-logo {
            width: 150px;
            height: auto;
            border-radius: 10px;
            flex-shrink: 0;
        }
        .stream-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
        }
        .stream-container {
            flex: 2;
            min-width: 300px;
            aspect-ratio: 16 / 9;
        }
        .chat-container {
            flex: 1;
            min-width: 300px;
            height: 450px;
        }
        @media (max-width: 600px) {
            .stream-title {
                font-size: 1.2rem;
            }
            .stream-logo {
                width: 100px;
            }
        }
    </style>
</head>
<body>

    <div id="livestream-overlay">
      <div class="stream-header">
        <h2 class="stream-title"><span style="color: yellow; border: 2px solid yellow; padding: 2px 5px;">LIVE Stream</span><br>00:00 Intro - 00:00 Anfang</h2>
        <img src="Rock TV Logo1.png" class="stream-logo" alt="Stream Info Bild">
      </div>

      <div class="stream-layout">
        <div class="stream-container">
          <iframe style="width: 100%; height: 100%; border-radius: 15px;" 
                  src="https://player.twitch.tv/?channel=die_Goblins1&parent=Rock-TV.github.io" 
                  frameborder="0" 
                  allowfullscreen="true">
          </iframe>
        </div>

        <div class="chat-container">
          <iframe src="https://organizations.minnit.chat/863371023870187/c/Main?embed" style="width:100%; height:100%; border:none; border-radius: 15px;">Chat</iframe>
        </div>
      </div>
    </div>

</body>
</html>
