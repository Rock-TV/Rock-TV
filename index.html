<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            font-family: Arial, sans-serif;
        }
        .stream-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
        }
        .stream-container {
            flex: 2;
            min-width: 300px;
            aspect-ratio: 16 / 9;
        }
        .chat-container {
            flex: 1;
            min-width: 300px;
            height: 450px;
        }
    </style>
</head>
<body>

    <div id="livestream-overlay" style="display: flex; position: absolute; top: 0; left: 0; width: 100%; min-height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box;">
      <h2 style="color: #fff; margin-bottom: 10px; margin-top: 20px; text-align: center;">LIVE Stream<br>00:00 Intro - 00:00 Anfang</h2>
      
      <img src="Rock TV Logo1.png" style="max-width: 300px; border-radius: 10px; margin-bottom: 25px;" alt="Stream Info Bild">

      <div class="stream-layout">
        <div class="stream-container">
          <iframe style="width: 100%; height: 100%; border-radius: 15px;" 
                  src="https://player.twitch.tv/?channel=die_Goblins1&parent=Rock-TV.github.io" 
                  frameborder="0" 
                  allowfullscreen="true">
          </iframe>
        </div>

        <div class="chat-container">
          <iframe src="https://organizations.minnit.chat/863371023870187/c/Main?embed" style="width:100%; height:100%; border:none; border-radius: 15px;">Chat</iframe>
        </div>
      </div>
    </div>

</body>
</html>
