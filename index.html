<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream</title>
    <style>
        body {
            margin: 0;
            background-color: #0d1b2a;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Vorhang-Animation */
        .curtain-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            display: flex;
            pointer-events: none;
        }
        .curtain-half {
            width: 50%;
            height: 100%;
            background-color: #1b263b; /* Farbe des Vorhangs */
            transition: transform 1.5s ease-in-out;
        }
        .curtain-left { transform: translateX(0); border-right: 2px solid #e0e1dd; }
        .curtain-right { transform: translateX(0); border-left: 2px solid #e0e1dd; }
        
        body.loaded .curtain-left { transform: translateX(-100%); }
        body.loaded .curtain-right { transform: translateX(100%); }

        #livestream-overlay {
            display: flex;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 100%;
            background-color: #0d1b2a;
            z-index: 3000;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .stream-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 25px;
            gap: 20px;
        }
        .stream-title {
            color: #fff;
            margin: 0;
            text-align: left;
        }

        /* Dynamischer Live-Badge */
        .live-badge {
            display: inline-flex;
            align-items: center;
            position: relative;
            padding: 2px 25px 2px 5px;
            font-weight: bold;
            transition: all 0.5s ease;
        }
        .live-badge::after {
            content: '';
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: none;
        }

        /* Status Gelb (Warten) */
        .live-badge.waiting {
            color: yellow;
            border: 2px solid yellow;
        }

        /* Status Rot (Live) */
        .live-badge.live {
            color: red;
            border: 2px solid red;
        }
        .live-badge.live::after {
            display: block;
            background-color: red;
            animation: blink 1s infinite alternate;
        }

        @keyframes blink {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        .stream-logo {
            width: 150px;
            height: auto;
            border-radius: 10px;
            flex-shrink: 0;
        }
        .stream-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
        }
        .stream-container {
            flex: 2;
            min-width: 300px;
            aspect-ratio: 16 / 9;
        }
        
        /* Chat-Container mit flexibler Höhe */
        .chat-container {
            flex: 1;
            min-width: 300px;
            height: 450px; 
        }

        @media (max-width: 900px) {
            .chat-container {
                height: 250px; /* Kürzer, wenn unter dem Stream */
            }
        }

        @media (max-width: 600px) {
            .stream-title {
                font-size: 1.2rem;
            }
            .stream-logo {
                width: 100px;
            }
        }
    </style>
</head>
<body>

    <!-- Vorhang Elemente -->
    <div class="curtain-container">
        <div class="curtain-half curtain-left"></div>
        <div class="curtain-half curtain-right"></div>
    </div>

    <div id="livestream-overlay">
      <div class="stream-header">
        <h2 class="stream-title">
            <span id="streamStatus" class="live-badge waiting">LIVE Stream</span>
            <br>
            <span id="countdownDisplay">00:00:00</span>
        </h2>
        <img src="Rock TV Logo1.png" class="stream-logo" alt="Stream Info Bild">
      </div>

      <div class="stream-layout">
        <div class="stream-container">
          <iframe style="width: 100%; height: 100%; border-radius: 15px;" 
                  src="https://player.twitch.tv/?channel=die_Goblins1&parent=Rock-TV.github.io" 
                  frameborder="0" 
                  allowfullscreen="true">
          </iframe>
        </div>

        <div class="chat-container">
          <iframe src="https://organizations.minnit.chat/863371023870187/c/Main?embed" style="width:100%; height:100%; border:none; border-radius: 15px;">Chat</iframe>
        </div>
      </div>
    </div>

    <script>
        // ================= CONFIGURATION =================
        // Hier stellst du ein, wann der Live-Stream STARTET (Jahr, Monat-1, Tag, Stunde, Minute, Sekunde)
        // Hinweis: Monate zählen von 0-11 (0 = Januar, 6 = Juli, 11 = Dezember)
        const LIVE_START = new Date(2026, 7, 7, 15, 30, 0); 

        // Hier stellst du ein, wann der Live-Stream ENDET (wieder zurück auf Gelb schaltet)
        const LIVE_END = new Date(2026, 7, 7, 16, 0, 0);
        // =================================================

        // Vorhang nach kurzer Verzögerung öffnen
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.body.classList.add('loaded');
            }, 500); // Wartet eine halbe Sekunde, öffnet sich dann für 1.5s
        });

        // Countdown und Status Logik
        const statusBadge = document.getElementById('streamStatus');
        const countdownDisplay = document.getElementById('countdownDisplay');

        function updateStream() {
            const now = new Date();

            if (now < LIVE_START) {
                // Vor dem Stream: Gelb + Countdown läuft rückwärts
                statusBadge.className = "live-badge waiting";
                
                const diff = LIVE_START - now;
                const hours = Math.floor(diff / (1000 * 60 * 60)).toString().padStart(2, '0');
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                const seconds = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
                
                countdownDisplay.textContent = `${hours}:${minutes}:${seconds}`;
            } 
            else if (now >= LIVE_START && now < LIVE_END) {
                // Während des Streams: Rot (Live) + Countdown bleibt auf 00:00:00
                statusBadge.className = "live-badge live";
                countdownDisplay.textContent = "00:00:00";
            } 
            else {
                // Nach dem Stream-Ende: Zurück auf Gelb + Countdown bleibt auf 00:00:00
                statusBadge.className = "live-badge waiting";
                countdownDisplay.textContent = "00:00:00";
            }
        }

        // Jede Sekunde aktualisieren
        setInterval(updateStream, 1000);
        updateStream();
    </script>
</body>
</html>
