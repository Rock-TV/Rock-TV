<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock TV</title>
    <style>
        body {
            margin: 0;
            background-color: #0d1b2a;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Vorhang-Animation mit Samt-Optik */
        .curtain-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            display: flex;
            pointer-events: none;
        }
        .curtain-half {
            width: 50%;
            height: 100%;
            /* Erzeugt den typischen Faltenwurf eines Theater-Vorhangs */
            background: repeating-linear-gradient(
                90deg,
                #660000,
                #7a0000 20px,
                #8f0000 40px,
                #a30000 60px,
                #520000 80px
            );
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.7);
            transition: transform 4.0s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .curtain-left { 
            transform: translateX(0); 
            border-right: 3px solid #3d0000; 
        }
        .curtain-right { 
            transform: translateX(0); 
            border-left: 3px solid #3d0000; 
        }
        
        body.loaded .curtain-left { transform: translateX(-100%); }
        body.loaded .curtain-right { transform: translateX(100%); }

        #livestream-overlay {
            display: flex;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 100%;
            background-color: #0d1b2a;
            z-index: 3000;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .stream-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 25px;
            gap: 20px;
            position: relative;
        }
        .stream-title {
            color: #fff;
            margin: 0;
            text-align: left;
            position: relative;
        }

        /* Abgerundeter Live-Badge */
        .live-badge {
            display: inline-flex;
            align-items: center;
            position: relative;
            padding: 4px 28px 4px 10px;
            font-weight: bold;
            border-radius: 20px;
            transition: all 0.5s ease;
            margin-bottom: 8px;
        }
        .live-badge::after {
            content: '';
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: none;
            background-color: red;
            animation: blink 1s infinite alternate;
        }

        .live-badge.waiting { color: yellow; border: 2px solid yellow; }
        .live-badge.live { color: red; border: 2px solid red; }
        .live-badge.live::after {
            display: block;
        }

        @keyframes blink {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        /* Ablaufplan-Button und Menü */
        .schedule-wrapper {
            position: absolute;
            top: 40px;
            left: 0;
            z-index: 4000;
            display: none;
        }
        .schedule-btn {
            background-color: #d97706;
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #f59e0b;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            user-select: none;
        }
        .schedule-btn .arrow {
            display: inline-block;
            transition: transform 0.3s ease;
            font-size: 0.75rem;
        }
        .schedule-content {
            max-height: 0;
            overflow: hidden;
            background-color: #1e293b;
            border-radius: 6px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            transition: max-height 0.3s ease-in-out, padding 0.3s ease;
            width: max-content;
            max-width: 280px;
            font-size: 0.85rem;
            color: #e2e8f0;
            box-sizing: border-box;
        }
        .schedule-content.open {
            max-height: 300px;
            padding: 10px;
            border: 1px solid #475569;
            margin-top: 5px;
        }
        .schedule-content.open + .schedule-btn .arrow {
            transform: rotate(180deg);
        }

        .stream-logo {
            width: 150px;
            height: auto;
            border-radius: 10px;
            flex-shrink: 0;
        }
        .stream-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
        }
        .stream-container {
            flex: 2;
            min-width: 300px;
            aspect-ratio: 16 / 9;
        }
        
        .chat-container {
            flex: 1;
            min-width: 300px;
            height: 450px; 
            display: none;
        }

        @media (max-width: 900px) { .chat-container { height: 250px; } }
        @media (max-width: 600px) {
            .stream-title { font-size: 1.2rem; }
            .stream-logo { width: 100px; }
        }
    </style>
</head>
<body>

    <div class="curtain-container">
        <div class="curtain-half curtain-left"></div>
        <div class="curtain-half curtain-right"></div>
    </div>

    <div id="livestream-overlay">
      <div class="stream-header">
        <h2 class="stream-title">
            <span id="streamStatus" class="live-badge waiting">Rock TV</span>
            <br>
            <!-- Countdown Container -->
            <span id="countdownDisplay">00:00:00</span>
            
            <!-- Ablaufplan Container -->
            <div id="scheduleWrapper" class="schedule-wrapper">
                <div id="scheduleBtn" class="schedule-btn">Ablauf-Plan <span class="arrow">▼</span></div>
                <div id="scheduleContent" class="schedule-content">
                    15:30 - Begrüßung<br>
                    15:45 - Gameplay Part 1<br>
                    16:00 - Q&A und Ende
                </div>
            </div>
        </h2>
        <img src="Rock TV_LOGO.png" class="stream-logo" alt="Stream Info Bild">
      </div>

      <div class="stream-layout">
        <div class="stream-container">
          <iframe style="width: 100%; height: 100%; border-radius: 15px;" 
                  src="https://www.youtube.com/embed/lbNegl7X_CA" 
                  title="YouTube video player" 
                  frameborder="0" 
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                  allowfullscreen>
          </iframe>
        </div>

        <div id="chatContainer" class="chat-container">
          <iframe src="https://organizations.minnit.chat/863371023870187/c/Main?embed" style="width:100%; height:100%; border:none; border-radius: 15px;">Chat</iframe>
        </div>
      </div>
    </div>

    <script>
        // ================= CONFIGURATION =================
        const LIVE_START = new Date(2026, 6, 9, 20, 10, 0); 
        const LIVE_END = new Date(2026, 6, 9, 20, 20, 0);
        // =================================================

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { document.body.classList.add('loaded'); }, 500);
        });

        const statusBadge = document.getElementById('streamStatus');
        const countdownDisplay = document.getElementById('countdownDisplay');
        const chatContainer = document.getElementById('chatContainer');
        const scheduleWrapper = document.getElementById('scheduleWrapper');
        const scheduleBtn = document.getElementById('scheduleBtn');
        const scheduleContent = document.getElementById('scheduleContent');

        // Ablaufplan toggle-Logik
        scheduleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            scheduleContent.classList.toggle('open');
        });
        document.addEventListener('click', () => {
            scheduleContent.classList.remove('open');
        });

        function updateStream() {
            const now = new Date();

            if (now < LIVE_START) {
                statusBadge.className = "live-badge waiting";
                countdownDisplay.style.display = "inline";
                scheduleWrapper.style.display = "none";
                scheduleContent.classList.remove('open');
                chatContainer.style.display = "none";
                
                const diff = LIVE_START - now;
                const hours = Math.floor(diff / (1000 * 60 * 60)).toString().padStart(2, '0');
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                const seconds = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
                
                countdownDisplay.textContent = `${hours}:${minutes}:${seconds}`;
            } 
            else if (now >= LIVE_START && now < LIVE_END) {
                statusBadge.className = "live-badge live";
                countdownDisplay.style.display = "none";
                scheduleWrapper.style.display = "block";
                chatContainer.style.display = "block";
            } 
            else {
                statusBadge.className = "live-badge waiting";
                countdownDisplay.style.display = "inline";
                countdownDisplay.textContent = "00:00:00";
                scheduleWrapper.style.display = "none";
                scheduleContent.classList.remove('open');
                chatContainer.style.display = "none";
            }
        }

        setInterval(updateStream, 1000);
        updateStream();
    </script>
</body>
</html>
